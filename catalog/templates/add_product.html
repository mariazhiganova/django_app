{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h1>Добавление нового продукта</h1>
    <div class="row">
        <div class="col-4">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="{{ form.name.id_for_label }}" class="form-label">Название</label>
                    {{ form.name }}
                </div>
                <div class="mb-3">
                    <label for="{{ form.description.id_for_label }}" class="form-label">Описание</label>
                    {{ form.description }}
                </div>
                <div class="mb-3">
                    <label for="{{ form.image.id_for_label }}" class="form-label">Изображение</label>
                    {{ form.image }}
                </div>
                <div class="mb-3">
                    <label for="{{ form.category.id_for_label }}" class="form-label">Категория</label>
                    {{ form.category }}
                </div>
                <div class="mb-3">
                    <label for="{{ form.price.id_for_label }}" class="form-label">Цена</label>
                    {{ form.price }}
                </div>
                <button type="submit" class="btn btn-primary">Добавить</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
