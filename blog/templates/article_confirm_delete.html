{% extends 'base.html' %}
{% block content %}
{% include 'includes/menu.html' %}
<div class="container">
    <h1>Удаление статьи</h1>
    <div class="row">
        <div class="col-4">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
              <p class="card-text">Действительно ли вы хотите удалить статью {{ object.title }}? Удаление невозвратно</p>
                <button type="submit" class="btn btn-primary">
                    Удалить
                </button>
                <a href="{% url 'blog:home' %}" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
